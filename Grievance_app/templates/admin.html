{% extends "layout.html" %}
{% block content %}
<h3 class="text-light mb-4 fade-in"><i class="bi bi-gear"></i> Admin Dashboard</h3>

{% if complaints %}
  <div class="table-responsive fade-in">
    <table class="table table-hover align-middle text-light">
      <thead>
        <tr>
          <th>User</th>
          <th>Title</th>
          <th>Category</th>
          <th>Status</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for c in complaints %}
        <tr>
          <td>{{ c.user }}</td>
          <td>{{ c.title }}</td>
          <td><span class="badge bg-info text-dark">{{ c.category }}</span></td>
          <td>
            <form method="POST" action="{{ url_for('update_status', complaint_id=c._id) }}">
              <select name="status" class="form-select form-select-sm d-inline-block w-auto">
                <option value="Pending" {% if c.status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if c.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Resolved" {% if c.status == 'Resolved' %}selected{% endif %}>Resolved</option>
              </select>
              <button class="btn btn-sm btn-primary ms-1"><i class="bi bi-check-circle"></i></button>
            </form>
          </td>
          <td>{{ c.created_at }}</td>
          <td>
            <form method="POST" action="{{ url_for('delete_complaint', complaint_id=c._id) }}" onsubmit="return confirm('Delete this complaint?');">
              <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <div class="alert alert-info fade-in">No complaints found.</div>
{% endif %}
{% endblock %}
