{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center fade-in">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="text-center mb-3 text-info"><i class="bi bi-person-circle"></i> Login</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="label1">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="label1">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <p class="text-center mt-3 text-white">Don’t have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
