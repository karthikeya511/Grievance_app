{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 fade-in">
  <h3 class="text-light"><i class="bi bi-speedometer2"></i> Overall Complaints</h3>
  <a href="{{ url_for('complaint') }}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Complaint</a>
</div>

{% if complaints %}
  <div class="row">
    {% for c in complaints %}
    <div class="col-md-6 col-lg-4 mb-4 fade-in">
      <div class="card p-3 h-100">
        <h5 class="card-title">{{ c.title }}</h5>
        <p class="card-text">{{ c.description }}</p>
        <span class="badge bg-info text-dark">{{ c.category }}</span>
        <div>
          <span class="badge 
            {% if c.status == 'Resolved' %}bg-success
            {% elif c.status == 'In Progress' %}bg-warning text-dark
            {% else %}bg-danger{% endif %}">
            {{ c.status }}
          </span>
        </div>
        <small class="d-block mt-2">{{ c.created_at }}</small>
      </div>
    </div>
    {% endfor %}
  </div>
{% else %}
  <div class="alert alert-info fade-in">No complaints filed yet.</div>
{% endif %}
{% endblock %}
