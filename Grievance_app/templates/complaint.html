{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center fade-in">
  <div class="col-md-8">
    <div class="card p-4">
      <h3 class="text-center mb-3 text-light"><i class="bi bi-megaphone"></i> File a Complaint</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="label1">Complaint Title</label>
          <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="label1">Description</label>
          <textarea name="description" rows="4" class="form-control" required></textarea>
        </div>
        <div class="d-flex justify-content-end">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light me-2">Back</a>
          <button class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
